name: Update Formulas

on:
  workflow_dispatch:
  schedule:
    - cron: "23 */6 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: macos-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
      - uses: Homebrew/actions/setup-homebrew@main
      - name: Install tools
        run: brew list jq >/dev/null 2>&1 || brew install jq
      - name: Update cli-proxy-api
        run: |
          bash ./scripts/update-formula.sh \
            --repo router-for-me/CLIProxyAPI \
            --formula Formula/cli-proxy-api.rb \
            --arm-asset 'CLIProxyAPI_{version}_darwin_aarch64.tar.gz' \
            --intel-asset 'CLIProxyAPI_{version}_darwin_amd64.tar.gz'
      - name: Update octopus
        run: |
          bash ./scripts/update-formula.sh \
            --repo gclm/octopus \
            --formula Formula/octopus.rb \
            --arm-asset octopus-darwin-arm64.zip \
            --intel-asset octopus-darwin-x86_64.zip
      - name: Update securefox
        run: |
          bash ./scripts/update-formula.sh \
            --repo gclm/securefox \
            --formula Formula/securefox.rb \
            --arm-asset securefox-macos-arm64.tar.gz \
            --intel-asset securefox-macos-x64.tar.gz
      - name: Brew audit
        run: |
          brew audit --strict gclm/tap/cli-proxy-api
          brew audit --strict gclm/tap/octopus
          brew audit --strict --except=version gclm/tap/securefox
      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add Formula/
          git commit -m "chore: update formulas"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git pull --rebase origin main
          git push --set-upstream origin main
