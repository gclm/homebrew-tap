name: Update CLI Proxy API Plus Formula

on:
  workflow_dispatch:
  schedule:
    - cron: "23 */6 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Homebrew/actions/setup-homebrew@master
      - name: Install tools
        run: brew list jq >/dev/null 2>&1 || brew install jq
      - name: Refresh formula
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash ./scripts/update-cli-proxy-api-plus.sh
      - name: Brew audit
        run: brew audit --strict gclm/tap/cli-proxy-api-plus
      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add Formula/cli-proxy-api-plus.rb
          git commit -m "chore: update cli-proxy-api-plus formula"
          git push --set-upstream origin main
